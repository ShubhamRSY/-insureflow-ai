name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push Docker image to GHCR"
        required: true
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/insureflow-ai

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Unit + eval suite
        run: |
          pytest tests/ -v --ignore=tests/test_e2e.py \
            -W ignore::pytest.PytestUnknownMarkWarning
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: insureflow-evals-ci
          LANGSMITH_TRACING: "false"
      - name: Eval inventory smoke
        run: |
          python - <<'PY'
          from evaluations.cadence import cadence_inventory
          from evaluations.qa_ground_truth import ground_truth_inventory
          from evaluations.quality_gates import apply_quality_gates
          from evaluations.release_process import checklist_payload
          from evaluations.drift import drift_policy_payload
          assert cadence_inventory()["summary"]
          assert ground_truth_inventory()["totals"]["ground_truth_questions"] >= 1
          assert checklist_payload()["steps"]
          assert drift_policy_payload()["thresholds"]
          print("eval_inventory_ok")
          PY
        env:
          PYTHONPATH: ${{ github.workspace }}/src

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: insureflow-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/login-action@v3
        if: >
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.push_image)
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        if: >
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.push_image)
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and push to GHCR (CD)
        if: >
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.push_image)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cd-summary:
    runs-on: ubuntu-latest
    needs: [docker]
    if: >
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       github.event_name == 'workflow_dispatch')
    steps:
      - name: Publish deployment notes
        run: |
          echo "## Rytera CI/CD" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CI**: lint · mypy · pytest · frontend build · Docker build" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CD**: image → \`ghcr.io/${{ env.IMAGE_NAME }}\` (tags: sha, main, latest)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Evals**: nightly/weekly via \`scheduled_evals.yml\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Public app**: Cloudflare Tunnel → https://app.ryterainc.com/dashboard" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pull**: \`docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
